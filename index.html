<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hebrew Torah Reader</title>

<link rel="stylesheet" href="css/styles.css" />
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@700&display=swap" rel="stylesheet" />
</head>

<body>

<div id="topBar">
  <div class="text-column">
    <div class="header-chrome">
      <div id="siteLogo" class="site-logo">BULLA TORAH</div>
      <div id="authBar" hidden>
      <button type="button" id="authSignInBtn" class="auth-text-btn">Sign in</button>
      <button type="button" id="authProfileBtn" class="auth-profile-btn" hidden aria-haspopup="true" aria-expanded="false">
        <span id="authProfileName"></span>
      </button>
      <div id="authMenu" class="auth-menu" hidden role="menu">
        <button type="button" id="authWordBankBtn" role="menuitem">Word bank</button>
        <button type="button" id="authSignOutBtn" role="menuitem">Sign out</button>
      </div>
    </div>
    </div>

    <h1 id="title"></h1>

    <div id="controls">
      <div class="aliyah-section">
        <div class="section-label">Aliyah</div>
        <div id="aliyahTabs" class="segment-tabs" role="tablist"></div>
      </div>

      <div id="diasporaTabs" class="segment-tabs" role="tablist">
        <button type="button" class="segment-tab" data-diaspora="true">Diaspora</button>
        <button type="button" class="segment-tab" data-diaspora="false">Israel</button>
      </div>
    </div>
  </div>
</div>

<div id="difficultyBar">
  <div id="difficultyTabs" class="segment-tabs text-column" role="tablist"></div>
</div>

<div class="text-column">
  <div id="aliyah-info"></div>
</div>

<div id="content"></div>
<div id="popup"></div>

<div id="authModal" class="auth-modal" hidden>
  <div class="auth-modal-backdrop" data-auth-close></div>
  <div class="auth-modal-card" role="dialog" aria-labelledby="authModalTitle">
    <button type="button" class="auth-modal-close" data-auth-close aria-label="Close">×</button>
    <h2 id="authModalTitle">Sign in</h2>
    <div id="authModeTabs" class="auth-mode-tabs" role="tablist">
      <button type="button" id="authSignInTab" class="auth-mode-tab active" role="tab" aria-selected="true">Sign in</button>
      <button type="button" id="authSignUpTab" class="auth-mode-tab" role="tab" aria-selected="false">Create account</button>
    </div>
    <p id="authModalLead" class="auth-modal-lead">Welcome back. Enter your email and password.</p>
    <form id="authForm">
      <div id="authFirstNameField" hidden>
        <label for="authFirstName">First name</label>
        <input type="text" id="authFirstName" name="given-name" autocomplete="given-name" placeholder="First name" />
      </div>
      <label for="authEmail">Email</label>
      <input type="email" id="authEmail" name="email" autocomplete="email" required placeholder="you@example.com" />
      <div id="authPasswordField">
        <div class="auth-field-row">
          <label for="authPassword">Password</label>
          <button type="button" id="authForgotPasswordBtn" class="auth-forgot-password">Forgot password?</button>
        </div>
        <input type="password" id="authPassword" name="password" autocomplete="current-password" required minlength="6" placeholder="Password" />
      </div>
      <div id="authNewPasswordField" hidden>
        <label for="authNewPassword">New password</label>
        <input type="password" id="authNewPassword" name="new-password" autocomplete="new-password" minlength="6" placeholder="New password" />
        <label for="authConfirmPassword">Confirm password</label>
        <input type="password" id="authConfirmPassword" name="confirm-password" autocomplete="new-password" minlength="6" placeholder="Confirm password" />
      </div>
      <button type="submit" id="authSubmitBtn">Sign in</button>
    </form>
    <button type="button" id="authToggleModeBtn" class="auth-toggle-mode">New here? Create an account</button>
    <p id="authMessage" class="auth-modal-message" hidden></p>
  </div>
</div>

<div id="wordBankPanel" class="word-bank-panel" hidden>
  <div class="word-bank-backdrop" data-word-bank-close></div>
  <div class="word-bank-card" role="dialog" aria-labelledby="wordBankTitle">
    <div class="word-bank-header">
      <h2 id="wordBankTitle">Word bank</h2>
      <button type="button" class="word-bank-close" data-word-bank-close aria-label="Close">×</button>
    </div>
    <p id="wordBankGuest" class="word-bank-guest" hidden>
      Sign in to save vocabulary you want to practice.
      <button type="button" id="wordBankSignInBtn">Sign in</button>
    </p>
    <p id="wordBankEmpty" class="word-bank-empty" hidden>No saved words yet. Tap a word while reading and choose “Save to word list”.</p>
    <ul id="wordBankList" class="word-bank-list"></ul>
  </div>
</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
