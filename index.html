<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hebrew Torah Reader</title>

<link rel="stylesheet" href="css/styles.css" />

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div id="topBar">
  <div class="text-column">
    <h1 id="title"></h1>

    <div id="controls">
      <div class="aliyah-section">
        <div class="section-label">Aliyah</div>
        <div id="aliyahTabs" class="segment-tabs" role="tablist"></div>
      </div>

      <div id="diasporaTabs" class="segment-tabs" role="tablist">
        <button type="button" class="segment-tab" data-diaspora="true">Diaspora</button>
        <button type="button" class="segment-tab" data-diaspora="false">Israel</button>
      </div>
    </div>
  </div>
</div>

<div id="difficultyBar">
  <div id="difficultyTabs" class="segment-tabs text-column" role="tablist"></div>
</div>

<div class="text-column">
  <div id="aliyah-info"></div>
</div>

<div id="content"></div>
<div id="popup"></div>

<script type="module" src="js/app.js"></script>

</body>
</html>
