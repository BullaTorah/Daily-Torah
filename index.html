<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hebrew Torah Reader</title>

<div id="difficultyWrap">
  <div id="difficultyBar">
    <div id="difficultyTrack"></div>
    <div id="difficultyKnob"></div>

    <div class="tick" data-value="0">0</div>
    <div class="tick" data-value="100">100</div>
    <div class="tick" data-value="200">200</div>
    <div class="tick" data-value="300">300</div>
    <div class="tick" data-value="400">400</div>
    <div class="tick" data-value="500">500</div>
    <div class="tick" data-value="1000">1000</div>
    <div class="tick" data-value="2000">2000</div>
    <div class="tick" data-value="3000">3000</div>
    <div class="tick" data-value="4000">4000</div>
  </div>
</div>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: "EB Garamond", serif;
  max-width: 600px;
  margin: 40px auto;
  padding: 0 24px;
  background: #f5f2e9;
  color: #111;
}

h1 { text-align: center; font-weight: 600; }

#aliyah-info {
  text-align: center;
  color: #666;
  margin-bottom: 30px;
  font-size: 18px;
}

.verse {
  margin-bottom: 28px;
}

.num {
  text-align: center;
  color: #999;
  margin-bottom: 10px;
}

.hebrew {
  direction: rtl;
  font-family: "Heebo", sans-serif;
  font-size: 40px;
  line-height: 2;
}

.english {
  color: rgba(0,0,0,0.55);
  font-size: 18px;
  margin-top: 8px;
}

.word {
  cursor: pointer;
  padding: 0 2px;
  border-radius: 0;
  font-weight: 600;
  position: relative;
}

.word::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 10%;
  height: 30%;
  background: rgba(210, 193, 142, 0.3);
  z-index: -1;
}

.word.no-highlight::after {
  content: none !important;
}

/* remove any hover highlight entirely */
.word:hover {
  background: transparent;
}

#popup {
  position: absolute;
  display: none;
  background: #fff;
  color: #000;
  padding: 30px 36px; /* triple padding */
  border-radius: 0;
  max-width: 260px;
  font-size: 14px;
  z-index: 9999;
  pointer-events: none;
}

#difficultyWrap {
  width: 100%;
  max-width: 600px;
  margin: 10px auto 30px auto;
  position: relative;
}

/* main line */
#difficultyBar {
  position: relative;
  height: 40px;
}

/* 4px track */
#difficultyTrack {
  position: absolute;
  top: 18px;
  left: 0;
  right: 0;
  height: 4px;
  background: #111;
}

/* black sliding knob */
#difficultyKnob {
  position: absolute;
  top: 10px;
  width: 18px;
  height: 18px;
  background: #000;
  transform: translateX(-50%);
  cursor: pointer;
}

/* tick labels */
.tick {
  position: absolute;
  top: 0;
  transform: translateX(-50%);
  font-size: 12px;
  font-family: "EB Garamond", serif;
  color: #444;
}

#difficultyKnob {
  transition: left 0.08s linear;
}

/* hover = hand */
#difficultyKnob:hover {
  cursor: grab;
}

/* active drag = grabbing hand */
#difficultyKnob.dragging {
  cursor: grabbing;
}


</style>
</head>

<body>

<h1 id="title">Loading Torah...</h1>
<div id="aliyah-info"></div>
<div id="content"></div>
<div id="popup"></div>

<script>

let WORD_LOOKUP = {};
let LEXICON = {};
let FREQUENCY = {};
let GLOBAL_VERSES = [];
let suppressNextClick = false;

const DIFFICULTY_STEPS = [0, 100, 200, 300, 400, 500, 1000, 2000, 3000];


/* -----------------------------
   SAFE JSON LOADER (ONLY ONE)
------------------------------*/
const loadJSON = async (url) => {
  const res = await fetch(url);

  if (!res.ok) {
    throw new Error(`Fetch failed ${res.status} for ${url}`);
  }

  return res.json();
};

/* -----------------------------
   NORMALIZATION
------------------------------*/
function normalize(w) {
  return (w || "")
    .normalize("NFKD")
    .replace(/[\u0591-\u05C7]/g, "")
    .replace(/־/g, "")
    .replace(/[.,:;!?()\[\]"']/g, "")
    .replace(/\s+/g, "")
    .trim();
}

function stripPrefixes(word) {
  let w = word; // already normalized upstream

  const prefixes = ["ו","ב","ל","כ","מ","ה","ש"];

  if (prefixes.includes(w[0])) {
    const candidate = w.slice(1);

    // prevent destroying real roots like בני → בני (NOT ני)
    if (candidate.length >= 3) {
      return candidate;
    }
  }

  return w;
}

function toStrongId(id) {
  if (!id) return null;
  const match = String(id).match(/\d+/);
  return match ? match[0] : null;
}

function stripSefariaArtifacts(text) {
  if (!text) return "";

  return text
    // remove duplicated footnote glue like "bdescendants"
    .replace(/([a-z])([a-z]{1,20})(?=\s|$)/gi, (m, p1, p2) => {
      if (p2.length <= 3) return p1; // kill tiny glued markers
      return m;
    })

    // remove inline “Lit.” fragments safely (only standalone pattern)
    .replace(/\bLit\.[^.;—]*[.;—]?/g, "")

    // remove broken "Heb." fragments
    .replace(/\bHeb\.[^.;—]*[.;—]?/g, "")

    // collapse whitespace
    .replace(/\s+/g, " ")
    .trim();
}

function stripNiqqud(str) {
  return (str || "")
    // vowel points + cantillation marks
    .replace(/[\u0591-\u05C7]/g, "")
    // remove paseq (׀)
    .replace(/\u05C0/g, "")
    .trim();
}

function normalizeLemmaId(id) {
  if (!id) return null;
  return id
    .replace(/^[a-z]\//i, "")
    .replace(/\s+[a-z]$/i, "")
    .trim();
}

function isValidLemma(v) {
  if (!v) return false;
  if (/^[0-9]+$/.test(v)) return true;
  if (/^[0-9]+\s?[a-z]?$/i.test(v)) return true;
  if (/^[a-z]$/i.test(v)) return false;
  return true;
}

/* -----------------------------
   LOOKUP ENGINE
------------------------------*/
function lookup(word) {
  const cleanWord = normalize(word);

  // STEP 1: try direct match
  let strongs = WORD_LOOKUP[cleanWord];

  // STEP 2: fallback — strip prefix once safely
  if (!strongs) {
    const stripped = stripPrefixes(cleanWord);
    strongs = WORD_LOOKUP[stripped];
  }

  console.log("LOOKUP TRACE:", {
    word,
    cleanWord,
    strongs
  });

  if (!strongs) {
    return {
      lemma: null,
      gloss: "Unknown word",
      strongs: null
    };
  }

  const entry =
    LEXICON[String(strongs)] ||
    LEXICON[String(strongs).replace(/^0+/, "")];

  const strongId = toStrongId(strongs);

return {
  strongs: strongId,
  lemma: entry?.lemma || null,
  gloss: entry?.gloss || "—"
};
}

function normalizeStrongId(id) {
  if (!id) return null;

  return String(id)
    .replace(/^c\//, "")
    .replace(/^0+/, "")   // 🔥 critical: removes leading zeros
    .trim();
}

function renderHebrew(text) {
text = stripSefariaArtifacts(text);

  const container = document.createElement("span");

  const level = Number.isFinite(window.DIFFICULTY)
  ? window.DIFFICULTY
  : 0;

text = stripSefariaArtifacts(String(text || ""));
text = text.replace(/<[^>]*>/g, "");
text = text.replace(/&thinsp;|&nbsp;|&amp;|&lt;|&gt;/g, " ");
text = text.replace(/[\u0591-\u05AF]/g, "");

text.split(/[\s\u00A0־]+/).forEach(raw => {
if (!raw || raw === "׀") return;
    const rawNormalized = stripNiqqud(normalize(raw));
    const stripped = stripPrefixes(rawNormalized);

const info = lookup(raw);
const strongId = normalizeStrongId(info?.strongs);
const freq = FREQUENCY[String(strongId)] || FREQUENCY[Number(strongId)] || null;
const rank = freq?.rank ?? Infinity;

console.log("RANK TRACE:", {
  raw,
  strongId,
  rank,
  count: freq?.count
});

if (strongId) {
  console.log("STRONGS TEST:", raw, "=>", strongId);
}


    let hideUnderline = level === 0 ? false : rank > level;


    const el = document.createElement("span");
    el.className = "word";
    el.textContent = stripSefariaArtifacts(raw);
    el.dataset.word = raw;

    if (hideUnderline) {
      el.classList.add("no-highlight");
    }

    

    

    container.appendChild(el);
    container.appendChild(document.createTextNode(" "));
  });

  return container;
}



/* -----------------------------
   POPUP
------------------------------*/
function showPopup(data, anchorEl) {
  const p = document.getElementById("popup");

  p.innerHTML = `
    <div><strong>${data.word}</strong></div>
    <div>${data.gloss}</div>
    ${data.lemma ? `<div>Lemma: ${data.lemma}</div>` : ""}
    ${data.strongs ? `<div>Strong’s: ${data.strongs}</div>` : ""}
  `;

  p.style.display = "block";

  const rect = anchorEl.getBoundingClientRect();

  const popupRect = p.getBoundingClientRect();

  const margin = 8;

  let top = rect.top - popupRect.height - margin;
  let left = rect.left;

  // If too close to top → put below word
  if (top < margin) {
    top = rect.bottom + margin;
  }

  // Clamp left edge
  if (left < margin) {
    left = margin;
  }

  // Clamp right edge
  const maxLeft = window.innerWidth - popupRect.width - margin;
  if (left > maxLeft) {
    left = maxLeft;
  }

  p.style.top = `${top + window.scrollY}px`;
  p.style.left = `${left + window.scrollX}px`;
}

/* -----------------------------
   CLICK HANDLER
------------------------------*/
let difficultyValue = 0;

const knob = document.getElementById("difficultyKnob");
const bar = document.getElementById("difficultyBar");

function setDifficulty(val) {
  difficultyValue = val;

updateKnob(val);

  window.DIFFICULTY = val;

  const content = document.getElementById("content");
  content.innerHTML = "";

  window.MATCHES = 0;
  window.MISSES = 0;

  render(window.TITLE, GLOBAL_VERSES);

  console.log("DIFFICULTY:", val);
}




function snapToStep(x) {
  return DIFFICULTY_STEPS.reduce((prev, curr) => {
    return Math.abs(curr - x) < Math.abs(prev - x) ? curr : prev;
  });
}



/* -----------------------------
   NORMALIZE VERSES
------------------------------*/
function normalizeVerses(data) {
  let he = data.he || [];
  let en = data.text || [];

  // ensure arrays
  if (!Array.isArray(he)) he = [he];
  if (!Array.isArray(en)) en = [en];

  const verses = [];

  he.forEach((chapterHe, chapterIndex) => {
    const chapterEn = en[chapterIndex] || [];

    chapterHe.forEach((verseHe, verseIndex) => {
      const verseEn = chapterEn[verseIndex] || "";

      verses.push({
        label: verses.length + 1,
        he: stripSefariaArtifacts(String(verseHe)),
        en: cleanEnglish(String(verseEn))
      });
    });
  });

  return verses;
}

/* -----------------------------
   RENDER
------------------------------*/

function cleanEnglish(text) {
  if (!text) return "";

  if (Array.isArray(text)) {
    text = text.join(" ");
  }

  text = String(text);

  return text
    // 1. remove HTML
    .replace(/<[^>]*>/g, "")

    // 2. remove full footnote sentences
    .replace(/\b(Lit\.|Heb\.)[^.;—]*[.;—]?/g, "")

    // 3. FIX: remove glued footnote prefixes inside words (bdescendants → descendants)
    .replace(/([a-z])([a-z]{2,})(?=[A-Z\u0590-\u05FF])/g, (m, a, b) => {
      // drop tiny prefixes like "b" or "a"
      if (a.length === 1) return b;
      return m;
    })

    // 4. FIX: catch missing-space insertions between real words
    .replace(/([a-z])([A-Z][a-z]+)/g, "$1 $2")

    // 5. FIX: remove duplicated clause injection like "abetook"
    .replace(/\b([a-z])([A-Z][a-z]+)/g, "$2")

    // 6. normalize whitespace
    .replace(/\s+/g, " ")
    .trim();
}

function render(title, verses) {
  document.getElementById("title").textContent = title;

  const content = document.getElementById("content");
  content.innerHTML = "";

  verses.forEach(v => {
    const verse = document.createElement("div");
verse.className = "verse";

const right = document.createElement("div");

const num = document.createElement("div");
num.className = "num";
num.textContent = v.label;
right.appendChild(num);

    const hebrew = document.createElement("div");
    hebrew.className = "hebrew";
    hebrew.appendChild(renderHebrew(v.he));

    const english = document.createElement("div");
    english.className = "english";
    english.textContent = cleanEnglish(v.en);

    right.appendChild(hebrew);
    right.appendChild(english);

    
    verse.appendChild(right);

    content.appendChild(verse);


  });
}

document.getElementById("content").addEventListener("click", (e) => {
  const word = e.target.closest(".word");
  if (!word) return;

  const data = lookup(word.dataset.word);

  showPopup(
    {
      word: word.dataset.word,
      gloss: data.gloss,
      lemma: data.lemma,
      strongs: data.strongs
    },
    word
  );
});

function layoutTicksEvenly() {
  const ticks = document.querySelectorAll(".tick");

  ticks.forEach((tick, i) => {
    const value = DIFFICULTY_STEPS[i];

    tick.textContent = value; // ensures label matches logic

    const percent = i / (DIFFICULTY_STEPS.length - 1);
    tick.style.left = `${percent * 100}%`;
  });
}

let isDragging = false;

function getValueFromX(clientX) {
  const rect = bar.getBoundingClientRect();
  const x = clientX - rect.left;

  const percent = Math.max(0, Math.min(1, x / rect.width));

  const min = DIFFICULTY_STEPS[0];
  const max = DIFFICULTY_STEPS[DIFFICULTY_STEPS.length - 1];

  const rawValue = min + percent * (max - min);

  return snapToStep(rawValue);
}

function updateKnob(val) {
  const min = DIFFICULTY_STEPS[0];
  const max = DIFFICULTY_STEPS[DIFFICULTY_STEPS.length - 1];

  const percent = (val - min) / (max - min);
  knob.style.left = `${percent * 100}%`;
}

/* DRAG START */
knob.addEventListener("mousedown", (e) => {
  isDragging = true;
  knob.classList.add("dragging");
  e.preventDefault();
});

/* DRAG MOVE */
document.addEventListener("mousemove", (e) => {
  if (!isDragging) return;

  const rect = bar.getBoundingClientRect();
  const x = e.clientX - rect.left;

  const percent = Math.max(0, Math.min(1, x / rect.width));

  // move smoothly WITH cursor (no snapping yet)
  knob.style.left = `${percent * 100}%`;
});

/* DRAG END */
document.addEventListener("mouseup", (e) => {
  if (!isDragging) return;

  isDragging = false;
  knob.classList.remove("dragging");

  const val = getValueFromX(e.clientX);

  setDifficulty(val);

  // 🔥 prevent accidental click-through after drag
  suppressNextClick = true;
  setTimeout(() => {
    suppressNextClick = false;
  }, 50);
});

document.addEventListener("click", (e) => {
  const popup = document.getElementById("popup");
  const word = e.target.closest(".word");

  if (!word) {
    popup.style.display = "none";
  }
});

/* -----------------------------
   INIT (STABLE + SAFE)
------------------------------*/
(async function init() {

  try {
    const [words, lexicon, frequency] = await Promise.all([
      loadJSON("word-lookup.json"),
      loadJSON("gloss.json"),
      loadJSON("lemma-frequency.json")
    ]);

    WORD_LOOKUP = words;
    LEXICON = lexicon;
    
FREQUENCY = frequency;

    const calendar = await loadJSON("https://www.sefaria.org/api/calendars");

    const parsha = calendar?.calendar_items?.find(
      i => i.extraDetails?.aliyot
    );

    if (!parsha) throw new Error("No parsha");

    // -----------------------------
    // SAFE ALIYAH CLEANING
    // -----------------------------
    let aliyahRaw = parsha.extraDetails.aliyot[0];

// convert "Numbers 16:1-16:13" → "Numbers.16.1-16.13"
let aliyah = aliyahRaw
  .replace(/ /g, ".")
  .replace(/:/g, ".");


    const url =
      `https://www.sefaria.org/api/texts/${encodeURIComponent(aliyah)}?context=0&pad=0`;

    const res = await fetch(url);

    if (!res.ok) {
      throw new Error(`Sefaria fetch failed: ${res.status} for ${aliyah}`);
    }

    const data = await res.json();

    console.log("SEFARIA RAW RESPONSE:", data);

window.SEFARIA_DATA = data;





    // -----------------------------
    // HARD VALIDATION (IMPORTANT)
    // -----------------------------
    if (!data || (!data.he && !data.text)) {
  throw new Error("Invalid Sefaria response structure");
}

    // -----------------------------
    // NORMALIZE
    // -----------------------------
    const verses = normalizeVerses(data);

    GLOBAL_VERSES = verses;

    // -----------------------------
    // RENDER
    // -----------------------------
    render(parsha.displayValue.en, verses);
window.TITLE = parsha.displayValue.en;

setDifficulty(0);

layoutTicksEvenly();

  } catch (e) {
    console.error(e);
    document.getElementById("title").textContent =
      "Loading failed (check console)";
  }




})();

</script>

</body>
</html>
