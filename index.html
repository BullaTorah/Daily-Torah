<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hebrew Torah Reader</title>

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">
</head>

<body>

<div id="difficultyWrap">
  <div id="difficultyBar">
    <div id="difficultyTrack"></div>
    <div id="difficultyKnob"></div>

    <div class="tick" data-value="0">0</div>
    <div class="tick" data-value="100">100</div>
    <div class="tick" data-value="200">200</div>
    <div class="tick" data-value="300">300</div>
    <div class="tick" data-value="400">400</div>
    <div class="tick" data-value="500">500</div>
    <div class="tick" data-value="1000">1000</div>
    <div class="tick" data-value="2000">2000</div>
    <div class="tick" data-value="3000">3000</div>
    <div class="tick" data-value="4000">4000</div>
  </div>
</div>

<h1 id="title">Loading Torah...</h1>
<div id="aliyah-info"></div>
<div id="content"></div>
<div id="popup"></div>

<script src="js/app.js"></script>

</body>
</html>
