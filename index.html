<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hebrew Torah Reader</title>

<link rel="stylesheet" href="css/styles.css" />

<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<h1 id="title">Loading Torah...</h1>
<div id="aliyah-info"></div>

<div id="difficultyWrap">
  <div id="difficultyBar">
    <div id="difficultyTrack"></div>
    <div id="difficultyKnob"></div>

    <div class="tick">Beginner</div>
    <div class="tick">Easy</div>
    <div class="tick">Hard</div>
    <div class="tick">Advanced</div>
  </div>
</div>

<div id="content"></div>
<div id="popup"></div>

<script src="js/app.js"></script>

</body>
</html>
